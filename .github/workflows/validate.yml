name: Validate manifests

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/validate-manifests.js'
      - 'packages/_schema/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate every packages/**/manifest.json
        run: node scripts/validate-manifests.js
